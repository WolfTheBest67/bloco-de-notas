<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Bloco do Wolf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0F0A14;
    --bg-1:#170F1C;
    --bg-2:#211726;
    --bg-3:#2B1E31;
    --line:#3A2B41;
    --line-soft:#2A1F30;
    --gold:#C9A66B;
    --gold-soft:#E0C896;
    --gold-dim:#8A744E;
    --plum:#6B4470;
    --plum-soft:#8A5F8F;
    --text-0:#F0E8F0;
    --text-1:#C9BCCB;
    --text-2:#8E7D92;
    --text-3:#5F5263;
    --danger:#A85C5C;
    --shadow-deep: 0 20px 60px -10px rgba(0,0,0,0.7);
    --shadow-soft: 0 8px 24px -6px rgba(0,0,0,0.5);
    --r-sm:10px;
    --r-md:16px;
    --r-lg:24px;
  }

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

  html,body{
    width:100%;
    height:100%;
    background:var(--bg-0);
    overscroll-behavior:none;
  }

  body{
    font-family:'Outfit',sans-serif;
    color:var(--text-0);
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(107,68,112,0.18), transparent),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(201,166,107,0.06), transparent),
      var(--bg-0);
    min-height:100vh;
    overflow-x:hidden;
  }

  #app{
    display:flex;
    flex-direction:column;
    min-height:100vh;
    max-width:560px;
    margin:0 auto;
    position:relative;
  }

  ::selection{ background:var(--plum); color:var(--text-0); }

  /* scrollbar discreta */
  ::-webkit-scrollbar{ width:0; height:0; }

  /* ---------- SPLASH ---------- */
  #splash{
    position:fixed; inset:0; z-index:999;
    background:var(--bg-0);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:opacity .7s ease, visibility .7s ease;
  }
  #splash::before{
    content:'';
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 50% 35%, rgba(107,68,112,0.35), transparent 60%),
      radial-gradient(circle at 50% 80%, rgba(201,166,107,0.08), transparent 60%);
  }
  #splash.hide{ opacity:0; visibility:hidden; pointer-events:none; }

  .splash-mark{
    position:relative;
    display:flex; flex-direction:column; align-items:center; gap:18px;
  }

  .quill-wrap{ width:64px; height:64px; position:relative; }
  .quill-wrap svg{ width:100%; height:100%; }
  .quill-line{
    fill:none;
    stroke:var(--gold);
    stroke-width:1.6;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:140;
    stroke-dashoffset:140;
    animation:draw 1.6s ease forwards;
  }
  @keyframes draw{ to{ stroke-dashoffset:0; } }

  .splash-title{
    font-family:'Fraunces',serif;
    font-style:italic;
    font-weight:500;
    font-size:30px;
    letter-spacing:.5px;
    color:var(--text-0);
    opacity:0;
    transform:translateY(8px);
    animation:riseIn .8s ease forwards;
    animation-delay:.5s;
  }
  .splash-sub{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--gold-dim);
    opacity:0;
    animation:riseIn .8s ease forwards;
    animation-delay:.85s;
  }
  @keyframes riseIn{ to{ opacity:1; transform:translateY(0); } }

  .splash-greet{
    position:absolute;
    bottom:54px;
    font-family:'Outfit',sans-serif;
    font-size:13px;
    color:var(--text-3);
    opacity:0;
    animation:riseIn .8s ease forwards;
    animation-delay:1.2s;
    text-align:center;
    padding:0 30px;
  }
  .splash-greet b{ color:var(--text-2); font-weight:500; }

  /* ---------- HEADER ---------- */
  header{
    position:sticky; top:0; z-index:40;
    padding:18px 18px 0 18px;
    background:linear-gradient(180deg, var(--bg-0) 70%, transparent);
    backdrop-filter:blur(6px);
  }

  .header-top{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:14px;
  }

  .brand{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:25px;
    color:var(--text-0);
    letter-spacing:.2px;
  }
  .brand em{
    font-style:italic;
    color:var(--gold);
    font-weight:500;
  }

  .note-count{
    font-family:'Space Mono',monospace;
    font-size:11px;
    color:var(--text-3);
    letter-spacing:1px;
  }

  .search-row{
    display:flex; align-items:center; gap:10px;
    margin-bottom:14px;
  }

  .search-box{
    flex:1;
    display:flex; align-items:center; gap:10px;
    background:var(--bg-2);
    border:1px solid var(--line-soft);
    border-radius:var(--r-md);
    padding:11px 14px;
    transition:border-color .2s;
  }
  .search-box:focus-within{ border-color:var(--gold-dim); }
  .search-box svg{ width:16px; height:16px; flex-shrink:0; opacity:.5; }
  .search-box input{
    flex:1;
    background:none; border:none; outline:none;
    color:var(--text-0);
    font-family:'Outfit',sans-serif;
    font-size:14.5px;
  }
  .search-box input::placeholder{ color:var(--text-3); }

  .view-toggle{
    display:flex;
    background:var(--bg-2);
    border:1px solid var(--line-soft);
    border-radius:var(--r-md);
    padding:3px;
    flex-shrink:0;
  }
  .view-toggle button{
    width:34px; height:34px;
    display:flex; align-items:center; justify-content:center;
    background:none; border:none;
    border-radius:9px;
    color:var(--text-3);
    cursor:pointer;
    transition:all .2s;
  }
  .view-toggle button svg{ width:16px; height:16px; }
  .view-toggle button.active{
    background:var(--plum);
    color:var(--text-0);
  }

  /* categorias */
  .cat-scroll{
    display:flex; gap:8px;
    overflow-x:auto;
    padding-bottom:16px;
    scroll-snap-type:x proximity;
  }
  .cat-scroll::-webkit-scrollbar{ display:none; }

  .cat-chip{
    flex-shrink:0;
    display:flex; align-items:center; gap:6px;
    padding:7px 13px;
    border-radius:30px;
    background:var(--bg-2);
    border:1px solid var(--line-soft);
    font-family:'Outfit',sans-serif;
    font-size:12.5px;
    font-weight:500;
    color:var(--text-2);
    cursor:pointer;
    white-space:nowrap;
    transition:all .2s;
  }
  .cat-chip .dot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .cat-chip.active{
    background:var(--bg-3);
    border-color:var(--gold-dim);
    color:var(--text-0);
  }
  .cat-chip .cnt{ color:var(--text-3); font-family:'Space Mono',monospace; font-size:10.5px; }

  /* ---------- MAIN / NOTES ---------- */
  main{
    flex:1;
    padding:4px 18px 110px 18px;
  }

  .empty-state{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding:80px 30px 40px;
    color:var(--text-3);
  }
  .empty-state svg{ width:46px; height:46px; opacity:.4; margin-bottom:18px; }
  .empty-state .e-title{
    font-family:'Fraunces',serif;
    font-style:italic;
    font-size:19px;
    color:var(--text-1);
    margin-bottom:6px;
  }
  .empty-state .e-sub{ font-size:13px; max-width:240px; line-height:1.5; }

  /* LISTA */
  .notes-list{ display:flex; flex-direction:column; gap:10px; }

  .note-card{
    position:relative;
    background:var(--bg-1);
    border:1px solid var(--line-soft);
    border-radius:var(--r-md);
    padding:16px 16px 14px 18px;
    cursor:pointer;
    transition:transform .15s ease, border-color .2s;
    overflow:hidden;
  }
  .note-card::before{
    content:'';
    position:absolute; left:0; top:0; bottom:0;
    width:4px;
    background:var(--cat-color, var(--gold-dim));
  }
  .note-card:active{ transform:scale(.985); }

  .note-card.pinned{ border-color:rgba(201,166,107,0.35); }

  .note-top-row{
    display:flex; align-items:flex-start; justify-content:space-between;
    gap:10px;
    margin-bottom:6px;
  }
  .note-title{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:16.5px;
    color:var(--text-0);
    line-height:1.3;
    flex:1;
  }
  .note-title:empty::before{ content:'Sem título'; color:var(--text-3); font-style:italic; font-weight:400;}

  .pin-flag{ flex-shrink:0; width:14px; height:14px; color:var(--gold); margin-top:2px;}

  .note-preview{
    font-size:13.5px;
    color:var(--text-2);
    line-height:1.5;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .note-preview:empty::before{ content:'Nenhum conteúdo ainda'; color:var(--text-3); font-style:italic; }

  .note-meta-row{
    display:flex; align-items:center; gap:10px;
    margin-top:11px;
  }
  .meta-date{
    font-family:'Space Mono',monospace;
    font-size:10.5px;
    color:var(--text-3);
    letter-spacing:.3px;
  }
  .meta-cat{
    font-size:10.5px;
    font-family:'Outfit',sans-serif;
    font-weight:500;
    color:var(--cat-color, var(--gold-dim));
    display:flex; align-items:center; gap:4px;
  }
  .meta-cat .dot{ width:6px; height:6px; border-radius:50%; background:currentColor; }

  .fav-flag{
    margin-left:auto;
    width:15px; height:15px;
    color:var(--gold);
    flex-shrink:0;
  }

  /* GRID */
  .notes-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .notes-grid .note-card{ padding:14px 14px 12px 16px; }
  .notes-grid .note-title{ font-size:15px; }
  .notes-grid .note-preview{ font-size:12.5px; -webkit-line-clamp:4; }
  .notes-grid .note-meta-row{ flex-wrap:wrap; }

  /* PINNED divider */
  .section-label{
    font-family:'Space Mono',monospace;
    font-size:10.5px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--text-3);
    margin:18px 2px 10px;
    display:flex; align-items:center; gap:8px;
  }
  .section-label svg{ width:11px; height:11px; color:var(--gold-dim); }
  .section-label:first-child{ margin-top:6px; }

  /* ---------- FAB ---------- */
  .fab{
    position:fixed;
    bottom:28px; right:calc(50% - 280px + 22px);
    width:58px; height:58px;
    border-radius:50%;
    background:linear-gradient(145deg, var(--gold) 0%, var(--gold-dim) 100%);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 12px 28px -6px rgba(201,166,107,0.45), 0 4px 10px rgba(0,0,0,0.4);
    cursor:pointer;
    z-index:50;
    border:none;
    transition:transform .2s ease;
  }
  .fab:active{ transform:scale(.92); }
  .fab svg{ width:24px; height:24px; color:var(--bg-0); }

  @media (max-width:560px){
    .fab{ right:24px; }
  }

  /* ---------- EDITOR MODAL ---------- */
  .editor-overlay{
    position:fixed; inset:0; z-index:200;
    background:var(--bg-0);
    display:flex; flex-direction:column;
    transform:translateY(100%);
    transition:transform .35s cubic-bezier(.22,1,.36,1);
  }
  .editor-overlay.open{ transform:translateY(0); }

  .editor-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 14px;
    border-bottom:1px solid var(--line-soft);
    flex-shrink:0;
  }
  .editor-header .ic-btn{
    width:38px; height:38px;
    display:flex; align-items:center; justify-content:center;
    background:none; border:none;
    color:var(--text-1);
    border-radius:50%;
    cursor:pointer;
  }
  .editor-header .ic-btn:active{ background:var(--bg-2); }
  .editor-header .ic-btn svg{ width:21px; height:21px; }

  .editor-actions{ display:flex; gap:4px; align-items:center; }
  .editor-actions .ic-btn.active-gold{ color:var(--gold); }
  .editor-actions .ic-btn.active-danger{ color:var(--danger); }

  .editor-body{
    flex:1;
    overflow-y:auto;
    padding:6px 22px 30px;
  }

  .editor-title{
    width:100%;
    background:none; border:none; outline:none;
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:25px;
    color:var(--text-0);
    margin:10px 0 4px;
    resize:none;
    overflow:hidden;
  }
  .editor-title::placeholder{ color:var(--text-3); font-weight:500; }

  .editor-date{
    font-family:'Space Mono',monospace;
    font-size:11px;
    color:var(--text-3);
    margin-bottom:18px;
    display:block;
  }

  .editor-content{
    width:100%;
    min-height:40vh;
    background:none; border:none; outline:none;
    font-family:'Outfit',sans-serif;
    font-size:16px;
    line-height:1.7;
    color:var(--text-1);
    resize:none;
  }
  .editor-content::placeholder{ color:var(--text-3); }

  .editor-footer{
    flex-shrink:0;
    padding:14px 18px calc(14px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line-soft);
    display:flex; flex-direction:column; gap:12px;
  }

  .field-row{ display:flex; align-items:center; gap:10px; }
  .field-row .f-label{
    font-family:'Space Mono',monospace;
    font-size:10px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--text-3);
    width:62px;
    flex-shrink:0;
  }

  .cat-picker{ display:flex; gap:7px; overflow-x:auto; flex:1; }
  .cat-picker::-webkit-scrollbar{ display:none; }
  .cat-pick-chip{
    flex-shrink:0;
    padding:6px 12px;
    border-radius:20px;
    border:1.5px solid var(--line-soft);
    background:var(--bg-2);
    font-size:12px;
    font-family:'Outfit',sans-serif;
    color:var(--text-2);
    display:flex; align-items:center; gap:5px;
    cursor:pointer;
    white-space:nowrap;
  }
  .cat-pick-chip .dot{ width:6px; height:6px; border-radius:50%; }
  .cat-pick-chip.selected{ border-color:var(--pick-color); color:var(--text-0); background:var(--bg-3); }

  .color-picker{ display:flex; gap:9px; }
  .color-dot{
    width:24px; height:24px;
    border-radius:50%;
    cursor:pointer;
    border:2px solid transparent;
    transition:transform .15s;
    flex-shrink:0;
  }
  .color-dot.selected{ border-color:var(--text-0); transform:scale(1.12); }

  /* ---------- BACKDROP MODALS (categoria / confirmação) ---------- */
  .backdrop{
    position:fixed; inset:0; z-index:300;
    background:rgba(8,5,10,0.7);
    display:flex; align-items:flex-end; justify-content:center;
    opacity:0; visibility:hidden;
    transition:opacity .25s ease, visibility .25s ease;
  }
  .backdrop.open{ opacity:1; visibility:visible; }

  .sheet{
    width:100%; max-width:560px;
    background:var(--bg-1);
    border:1px solid var(--line-soft);
    border-bottom:none;
    border-radius:26px 26px 0 0;
    padding:10px 22px calc(26px + env(safe-area-inset-bottom));
    transform:translateY(40px);
    transition:transform .3s cubic-bezier(.22,1,.36,1);
  }
  .backdrop.open .sheet{ transform:translateY(0); }

  .sheet-handle{
    width:36px; height:4px;
    background:var(--line);
    border-radius:4px;
    margin:0 auto 18px;
  }

  .sheet-title{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-style:italic;
    font-size:19px;
    margin-bottom:16px;
    color:var(--text-0);
  }

  .new-cat-row{
    display:flex; gap:8px; margin-bottom:16px;
  }
  .new-cat-row input{
    flex:1;
    background:var(--bg-2);
    border:1px solid var(--line-soft);
    border-radius:12px;
    padding:10px 14px;
    color:var(--text-0);
    font-family:'Outfit',sans-serif;
    font-size:14px;
    outline:none;
  }
  .new-cat-row input:focus{ border-color:var(--gold-dim); }

  .btn{
    border:none; cursor:pointer;
    font-family:'Outfit',sans-serif;
    font-weight:500;
    border-radius:12px;
    transition:transform .15s, opacity .15s;
  }
  .btn:active{ transform:scale(.96); }
  .btn-gold{
    background:linear-gradient(145deg, var(--gold), var(--gold-dim));
    color:var(--bg-0);
    padding:10px 18px;
    font-weight:600;
  }
  .btn-ghost{
    background:var(--bg-2);
    color:var(--text-1);
    padding:10px 18px;
    border:1px solid var(--line-soft);
  }
  .btn-danger-text{ color:var(--danger); background:none; }

  .cat-manage-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:18px; max-height:30vh; overflow-y:auto; }
  .cat-manage-row{
    display:flex; align-items:center; gap:10px;
    padding:9px 12px;
    background:var(--bg-2);
    border-radius:12px;
  }
  .cat-manage-row .dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .cat-manage-row .name{ flex:1; font-size:13.5px; color:var(--text-1); }
  .cat-manage-row .del-cat{
    width:26px; height:26px; display:flex; align-items:center; justify-content:center;
    color:var(--text-3); background:none; border:none; cursor:pointer; border-radius:50%;
    flex-shrink:0;
  }
  .cat-manage-row .del-cat svg{ width:14px; height:14px; }

  .confirm-text{ font-size:14px; color:var(--text-2); line-height:1.5; margin-bottom:20px; }
  .confirm-actions{ display:flex; gap:10px; }
  .confirm-actions .btn{ flex:1; text-align:center; }

  .toast{
    position:fixed;
    bottom:100px; left:50%;
    transform:translate(-50%, 12px);
    background:var(--bg-3);
    border:1px solid var(--line);
    color:var(--text-0);
    padding:11px 20px;
    border-radius:30px;
    font-size:13px;
    font-family:'Outfit',sans-serif;
    box-shadow:var(--shadow-soft);
    z-index:400;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s, transform .3s;
    white-space:nowrap;
  }
  .toast.show{ opacity:1; transform:translate(-50%, 0); }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-mark">
    <div class="quill-wrap">
      <svg viewBox="0 0 64 64" fill="none">
        <path class="quill-line" d="M14 50 C 20 44, 24 40, 30 32 C 38 22, 42 16, 50 12 C 46 18, 40 24, 36 30 C 30 38, 26 42, 20 48 C 18 49.5, 16 50, 14 50 Z" />
        <path class="quill-line" d="M14 50 L 10 54" stroke-width="1.4" />
      </svg>
    </div>
    <div class="splash-title">Bloco do <em>Wolf</em></div>
    <div class="splash-sub">CADERNO PESSOAL</div>
  </div>
  <div class="splash-greet">Suas ideias, guardadas com <b>cuidado</b>.</div>
</div>

<div id="app">

  <header>
    <div class="header-top">
      <div class="brand">Bloco do <em>Wolf</em></div>
      <div class="note-count" id="noteCount">0 notas</div>
    </div>

    <div class="search-row">
      <div class="search-box">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Buscar nas suas notas..." />
      </div>
      <div class="view-toggle">
        <button id="viewListBtn" class="active" title="Lista">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        </button>
        <button id="viewGridBtn" title="Grade">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        </button>
      </div>
    </div>

    <div class="cat-scroll" id="catScroll"></div>
  </header>

  <main id="mainArea"></main>

  <button class="fab" id="fabAdd" title="Nova nota">
    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

</div>

<!-- EDITOR -->
<div class="editor-overlay" id="editorOverlay">
  <div class="editor-header">
    <button class="ic-btn" id="closeEditorBtn">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <div class="editor-actions">
      <button class="ic-btn" id="favBtn" title="Favoritar">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </button>
      <button class="ic-btn" id="pinBtn" title="Fixar">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>
      </button>
      <button class="ic-btn active-danger" id="deleteBtn" title="Excluir">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>
  </div>

  <div class="editor-body">
    <textarea class="editor-title" id="editorTitle" placeholder="Título" rows="1"></textarea>
    <span class="editor-date" id="editorDate"></span>
    <textarea class="editor-content" id="editorContent" placeholder="Escreva aqui o que quiser guardar..."></textarea>
  </div>

  <div class="editor-footer">
    <div class="field-row">
      <span class="f-label">Categoria</span>
      <div class="cat-picker" id="editorCatPicker"></div>
    </div>
    <div class="field-row">
      <span class="f-label">Cor</span>
      <div class="color-picker" id="editorColorPicker"></div>
    </div>
  </div>
</div>

<!-- SHEET: gerenciar categorias -->
<div class="backdrop" id="catBackdrop">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Suas categorias</div>
    <div class="new-cat-row">
      <input type="text" id="newCatInput" placeholder="Nome da nova categoria" maxlength="20" />
      <button class="btn btn-gold" id="addCatBtn">Criar</button>
    </div>
    <div class="cat-manage-list" id="catManageList"></div>
    <button class="btn btn-ghost" id="closeCatSheetBtn" style="width:100%;">Fechar</button>
  </div>
</div>

<!-- SHEET: confirmar exclusão -->
<div class="backdrop" id="confirmBackdrop">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Apagar esta nota?</div>
    <div class="confirm-text">Essa ação não pode ser desfeita. A nota será removida do seu bloco para sempre.</div>
    <div class="confirm-actions">
      <button class="btn btn-ghost" id="cancelDeleteBtn">Cancelar</button>
      <button class="btn btn-danger-text" id="confirmDeleteBtn" style="background:var(--danger); color:#fff;">Apagar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){

  /* ====================== CONFIG ====================== */
  const CAT_COLORS = ['#C9A66B','#6B4470','#5C8AA8','#A85C5C','#5CA87C','#8A744E','#8A5F8F'];
  const NOTE_COLORS = [
    {id:'default', hex:'var(--bg-1)', label:'Padrão'},
    {id:'gold', hex:'#3A311F', label:'Dourado'},
    {id:'plum', hex:'#2E1E33', label:'Vinho'},
    {id:'blue', hex:'#1B2A33', label:'Azul'},
    {id:'green', hex:'#1E2E26', label:'Verde'},
    {id:'red', hex:'#33201F', label:'Vermelho'},
  ];

  const STORAGE_KEY = 'bloco-wolf-data';

  let state = {
    notes: [],
    categories: [
      {id:'cat-ideias', name:'Ideias', color:CAT_COLORS[0]},
      {id:'cat-pessoal', name:'Pessoal', color:CAT_COLORS[1]},
      {id:'cat-tarefas', name:'Tarefas', color:CAT_COLORS[2]},
    ],
    viewMode:'list',
    activeCategory:'all',
    searchTerm:''
  };

  let currentEditingId = null;
  let pendingDeleteId = null;

  /* ====================== STORAGE ====================== */
  async function loadState(){
    try{
      const result = await window.storage.get(STORAGE_KEY);
      if(result && result.value){
        const parsed = JSON.parse(result.value);
        state.notes = parsed.notes || [];
        state.categories = parsed.categories || state.categories;
      }
    }catch(e){
      console.log('Primeira vez abrindo, começando do zero.');
    }
    render();
  }

  let saveTimeout = null;
  function saveState(){
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(async ()=>{
      try{
        await window.storage.set(STORAGE_KEY, JSON.stringify({
          notes: state.notes,
          categories: state.categories
        }));
      }catch(e){
        console.error('Erro ao salvar:', e);
        showToast('Não foi possível salvar agora');
      }
    }, 250);
  }

  /* ====================== HELPERS ====================== */
  function uid(prefix){ return prefix + '-' + Date.now() + '-' + Math.random().toString(36).slice(2,8); }

  function formatDate(ts){
    const d = new Date(ts);
    const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    return `${d.getDate()} ${months[d.getMonth()]} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function getCategory(id){ return state.categories.find(c=>c.id===id); }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._hideT);
    t._hideT = setTimeout(()=> t.classList.remove('show'), 1800);
  }

  /* ====================== RENDER: CATEGORY CHIPS (header) ====================== */
  function renderCatChips(){
    const wrap = document.getElementById('catScroll');
    const counts = {};
    state.notes.forEach(n=>{ counts[n.categoryId] = (counts[n.categoryId]||0)+1; });

    let html = `<div class="cat-chip ${state.activeCategory==='all'?'active':''}" data-cat="all">
        Todas <span class="cnt">${state.notes.length}</span>
      </div>`;

    state.categories.forEach(c=>{
      html += `<div class="cat-chip ${state.activeCategory===c.id?'active':''}" data-cat="${c.id}">
          <span class="dot" style="background:${c.color}"></span> ${escapeHtml(c.name)}
          <span class="cnt">${counts[c.id]||0}</span>
        </div>`;
    });

    html += `<div class="cat-chip" id="manageCatChip" style="color:var(--gold-dim);">
        <svg width="12" height="12" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Gerenciar
      </div>`;

    wrap.innerHTML = html;

    wrap.querySelectorAll('.cat-chip[data-cat]').forEach(chip=>{
      chip.addEventListener('click', ()=>{
        state.activeCategory = chip.dataset.cat;
        renderCatChips();
        renderNotes();
      });
    });
    document.getElementById('manageCatChip').addEventListener('click', openCatSheet);
  }

  function escapeHtml(s){
    const div = document.createElement('div');
    div.textContent = s || '';
    return div.innerHTML;
  }

  /* ====================== RENDER: NOTES ====================== */
  function getFilteredNotes(){
    let list = state.notes.slice();

    if(state.activeCategory !== 'all'){
      list = list.filter(n=>n.categoryId === state.activeCategory);
    }
    if(state.searchTerm.trim()){
      const term = state.searchTerm.toLowerCase();
      list = list.filter(n=>
        (n.title||'').toLowerCase().includes(term) ||
        (n.content||'').toLowerCase().includes(term)
      );
    }
    return list;
  }

  function noteCardHtml(n){
    const cat = getCategory(n.categoryId);
    const colorVar = cat ? cat.color : 'var(--gold-dim)';
    const colorObj = NOTE_COLORS.find(c=>c.id===n.colorId) || NOTE_COLORS[0];

    return `
      <div class="note-card ${n.pinned?'pinned':''}" data-id="${n.id}"
           style="--cat-color:${colorVar}; background:${colorObj.hex};">
        <div class="note-top-row">
          <div class="note-title">${escapeHtml(n.title)}</div>
          ${n.pinned ? `<svg class="pin-flag" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 17v5"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z" fill="currentColor"/></svg>` : ''}
        </div>
        <div class="note-preview">${escapeHtml((n.content||'').slice(0,160))}</div>
        <div class="note-meta-row">
          <span class="meta-date">${formatDate(n.updatedAt)}</span>
          ${cat ? `<span class="meta-cat"><span class="dot" style="background:${cat.color}"></span>${escapeHtml(cat.name)}</span>` : ''}
          ${n.favorite ? `<svg class="fav-flag" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>` : ''}
        </div>
      </div>
    `;
  }

  function renderNotes(){
    const main = document.getElementById('mainArea');
    const filtered = getFilteredNotes();

    document.getElementById('noteCount').textContent = state.notes.length === 1 ? '1 nota' : `${state.notes.length} notas`;

    if(filtered.length === 0){
      const isFiltering = state.searchTerm.trim() || state.activeCategory !== 'all';
      main.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
          <div class="e-title">${isFiltering ? 'Nada por aqui' : 'Seu bloco está em branco'}</div>
          <div class="e-sub">${isFiltering ? 'Tente outra busca ou categoria.' : 'Toque no botão dourado para escrever sua primeira nota.'}</div>
        </div>`;
      return;
    }

    const pinned = filtered.filter(n=>n.pinned).sort((a,b)=>b.updatedAt - a.updatedAt);
    const others = filtered.filter(n=>!n.pinned).sort((a,b)=>b.updatedAt - a.updatedAt);

    const containerClass = state.viewMode === 'grid' ? 'notes-grid' : 'notes-list';
    let html = '';

    if(pinned.length){
      html += `<div class="section-label"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 17v5"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z" fill="currentColor"/></svg>Fixadas</div>
        <div class="${containerClass}">${pinned.map(noteCardHtml).join('')}</div>`;
    }
    if(others.length){
      if(pinned.length){
        html += `<div class="section-label">Demais notas</div>`;
      }
      html += `<div class="${containerClass}">${others.map(noteCardHtml).join('')}</div>`;
    }

    main.innerHTML = html;

    main.querySelectorAll('.note-card').forEach(card=>{
      card.addEventListener('click', ()=> openEditor(card.dataset.id));
    });
  }

  /* ====================== EDITOR ====================== */
  function renderEditorCatPicker(selectedId){
    const wrap = document.getElementById('editorCatPicker');
    wrap.innerHTML = state.categories.map(c=>`
      <div class="cat-pick-chip ${selectedId===c.id?'selected':''}" data-cat="${c.id}" style="--pick-color:${c.color}">
        <span class="dot" style="background:${c.color}"></span>${escapeHtml(c.name)}
      </div>
    `).join('');

    wrap.querySelectorAll('.cat-pick-chip').forEach(chip=>{
      chip.addEventListener('click', ()=>{
        wrap.querySelectorAll('.cat-pick-chip').forEach(c=>c.classList.remove('selected'));
        chip.classList.add('selected');
        wrap.dataset.selected = chip.dataset.cat;
      });
    });
    wrap.dataset.selected = selectedId;
  }

  function renderEditorColorPicker(selectedId){
    const wrap = document.getElementById('editorColorPicker');
    wrap.innerHTML = NOTE_COLORS.map(c=>`
      <div class="color-dot ${selectedId===c.id?'selected':''}" data-color="${c.id}"
           style="background:${c.hex==='var(--bg-1)' ? '#1A1220' : c.hex}; border-color:${selectedId===c.id ? 'var(--text-0)' : 'transparent'};" title="${c.label}"></div>
    `).join('');

    wrap.querySelectorAll('.color-dot').forEach(dot=>{
      dot.addEventListener('click', ()=>{
        wrap.querySelectorAll('.color-dot').forEach(d=>{ d.classList.remove('selected'); d.style.borderColor='transparent'; });
        dot.classList.add('selected');
        dot.style.borderColor = 'var(--text-0)';
        wrap.dataset.selected = dot.dataset.color;
      });
    });
    wrap.dataset.selected = selectedId;
  }

  function autoGrowTitle(){
    const ta = document.getElementById('editorTitle');
    ta.style.height='auto';
    ta.style.height = ta.scrollHeight + 'px';
  }

  function openEditor(id){
    let note;
    if(id === 'new'){
      note = {
        id: uid('note'),
        title:'',
        content:'',
        categoryId: state.categories[0] ? state.categories[0].id : null,
        colorId:'default',
        pinned:false,
        favorite:false,
        createdAt: Date.now(),
        updatedAt: Date.now()
      };
      state.notes.unshift(note);
      currentEditingId = note.id;
    } else {
      note = state.notes.find(n=>n.id===id);
      currentEditingId = id;
    }
    if(!note) return;

    document.getElementById('editorTitle').value = note.title;
    document.getElementById('editorContent').value = note.content;
    document.getElementById('editorDate').textContent = note.updatedAt === note.createdAt
      ? `Criada em ${formatDate(note.createdAt)}`
      : `Editada em ${formatDate(note.updatedAt)}`;

    renderEditorCatPicker(note.categoryId);
    renderEditorColorPicker(note.colorId || 'default');

    updateToggleIcon('favBtn', note.favorite);
    updateToggleIcon('pinBtn', note.pinned);

    document.getElementById('editorOverlay').classList.add('open');
    setTimeout(autoGrowTitle, 50);

    if(id === 'new'){
      setTimeout(()=> document.getElementById('editorTitle').focus(), 350);
    }
  }

  function updateToggleIcon(btnId, isActive){
    const btn = document.getElementById(btnId);
    if(isActive){
      btn.classList.add('active-gold');
      btn.querySelector('svg').setAttribute('fill','currentColor');
    } else {
      btn.classList.remove('active-gold');
      btn.querySelector('svg').setAttribute('fill','none');
    }
  }

  function closeEditor(removeIfEmpty){
    const note = state.notes.find(n=>n.id===currentEditingId);

    if(note){
      const title = document.getElementById('editorTitle').value.trim();
      const content = document.getElementById('editorContent').value.trim();

      if(removeIfEmpty && !title && !content){
        state.notes = state.notes.filter(n=>n.id!==note.id);
      } else {
        note.title = title;
        note.content = content;
        note.categoryId = document.getElementById('editorCatPicker').dataset.selected || note.categoryId;
        note.colorId = document.getElementById('editorColorPicker').dataset.selected || 'default';
        note.updatedAt = Date.now();
      }
      saveState();
    }

    document.getElementById('editorOverlay').classList.remove('open');
    currentEditingId = null;
    renderCatChips();
    renderNotes();
  }

  /* ====================== CATEGORY SHEET ====================== */
  function renderCatManageList(){
    const wrap = document.getElementById('catManageList');
    wrap.innerHTML = state.categories.map(c=>`
      <div class="cat-manage-row">
        <span class="dot" style="background:${c.color}"></span>
        <span class="name">${escapeHtml(c.name)}</span>
        <button class="del-cat" data-id="${c.id}">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </button>
      </div>
    `).join('') || `<div style="font-size:13px; color:var(--text-3); padding:10px 0;">Nenhuma categoria ainda.</div>`;

    wrap.querySelectorAll('.del-cat').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.dataset.id;
        const hasNotes = state.notes.some(n=>n.categoryId===id);
        state.categories = state.categories.filter(c=>c.id!==id);
        if(hasNotes){
          state.notes.forEach(n=>{ if(n.categoryId===id) n.categoryId=null; });
        }
        if(state.activeCategory===id) state.activeCategory='all';
        saveState();
        renderCatManageList();
        renderCatChips();
        renderNotes();
        showToast('Categoria removida');
      });
    });
  }

  function openCatSheet(){
    renderCatManageList();
    document.getElementById('catBackdrop').classList.add('open');
  }
  function closeCatSheet(){
    document.getElementById('catBackdrop').classList.remove('open');
  }

  /* ====================== INIT EVENTS ====================== */
  function init(){

    document.getElementById('fabAdd').addEventListener('click', ()=> openEditor('new'));
    document.getElementById('closeEditorBtn').addEventListener('click', ()=> closeEditor(true));

    document.getElementById('editorTitle').addEventListener('input', autoGrowTitle);

    document.getElementById('favBtn').addEventListener('click', ()=>{
      const note = state.notes.find(n=>n.id===currentEditingId);
      if(!note) return;
      note.favorite = !note.favorite;
      updateToggleIcon('favBtn', note.favorite);
      saveState();
    });

    document.getElementById('pinBtn').addEventListener('click', ()=>{
      const note = state.notes.find(n=>n.id===currentEditingId);
      if(!note) return;
      note.pinned = !note.pinned;
      updateToggleIcon('pinBtn', note.pinned);
      saveState();
      showToast(note.pinned ? 'Nota fixada no topo' : 'Nota desfixada');
    });

    document.getElementById('deleteBtn').addEventListener('click', ()=>{
      pendingDeleteId = currentEditingId;
      document.getElementById('confirmBackdrop').classList.add('open');
    });

    document.getElementById('cancelDeleteBtn').addEventListener('click', ()=>{
      pendingDeleteId = null;
      document.getElementById('confirmBackdrop').classList.remove('open');
    });

    document.getElementById('confirmDeleteBtn').addEventListener('click', ()=>{
      state.notes = state.notes.filter(n=>n.id!==pendingDeleteId);
      saveState();
      document.getElementById('confirmBackdrop').classList.remove('open');
      document.getElementById('editorOverlay').classList.remove('open');
      currentEditingId = null;
      pendingDeleteId = null;
      renderCatChips();
      renderNotes();
      showToast('Nota apagada');
    });

    // view toggle
    document.getElementById('viewListBtn').addEventListener('click', ()=>{
      state.viewMode='list';
      document.getElementById('viewListBtn').classList.add('active');
      document.getElementById('viewGridBtn').classList.remove('active');
      renderNotes();
    });
    document.getElementById('viewGridBtn').addEventListener('click', ()=>{
      state.viewMode='grid';
      document.getElementById('viewGridBtn').classList.add('active');
      document.getElementById('viewListBtn').classList.remove('active');
      renderNotes();
    });

    // search
    let searchDebounce;
    document.getElementById('searchInput').addEventListener('input', (e)=>{
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(()=>{
        state.searchTerm = e.target.value;
        renderNotes();
      }, 150);
    });

    // category sheet
    document.getElementById('closeCatSheetBtn').addEventListener('click', closeCatSheet);
    document.getElementById('catBackdrop').addEventListener('click', (e)=>{
      if(e.target.id === 'catBackdrop') closeCatSheet();
    });
    document.getElementById('confirmBackdrop').addEventListener('click', (e)=>{
      if(e.target.id === 'confirmBackdrop'){
        document.getElementById('confirmBackdrop').classList.remove('open');
        pendingDeleteId = null;
      }
    });

    document.getElementById('addCatBtn').addEventListener('click', addNewCategory);
    document.getElementById('newCatInput').addEventListener('keydown', (e)=>{
      if(e.key === 'Enter') addNewCategory();
    });

    function addNewCategory(){
      const input = document.getElementById('newCatInput');
      const name = input.value.trim();
      if(!name) return;
      const color = CAT_COLORS[state.categories.length % CAT_COLORS.length];
      state.categories.push({ id: uid('cat'), name, color });
      input.value='';
      saveState();
      renderCatManageList();
      renderCatChips();
      showToast('Categoria criada');
    }

    // splash
    setTimeout(()=>{
      document.getElementById('splash').classList.add('hide');
    }, 2300);
  }

  /* ====================== RENDER ALL ====================== */
  function render(){
    renderCatChips();
    renderNotes();
  }

  init();
  loadState();

})();
</script>
</body>
</html>
